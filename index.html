<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for a pro feel */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex flex-col font-sans">

    <header class="bg-gray-800 p-4 shadow-md flex justify-between items-center border-b border-gray-700">
        <h1 class="text-xl font-bold flex items-center gap-2">
            <span class="text-blue-500">🔀</span> LLM Gateway
        </h1>
        <div class="text-sm text-gray-400">MoE Router Active</div>
    </header>

    <main class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6" id="chat-box">
        <div class="flex justify-start">
            <div class="bg-gray-800 rounded-2xl rounded-tl-none px-6 py-4 max-w-2xl shadow-sm border border-gray-700">
                <p class="text-gray-300 text-sm font-semibold mb-1">System <span class="text-xs text-blue-400 ml-2">Router Ready</span></p>
                <p>Hello! I am connected to your local MoE Gateway. Ask me a coding question or a general question, and the supervisor will route it to the best model!</p>
            </div>
        </div>
    </main>

    <footer class="bg-gray-800 p-4 border-t border-gray-700">
        <div class="max-w-4xl mx-auto flex gap-4">
            <input type="text" id="user-input" 
                class="flex-1 bg-gray-900 text-white rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 border border-gray-600 placeholder-gray-400"
                placeholder="Type your message here..."
                onkeypress="handleEnter(event)">
            
            <button onclick="sendMessage()" id="send-btn"
                class="bg-blue-600 hover:bg-blue-700 transition-colors text-white px-6 py-3 rounded-lg font-semibold flex items-center gap-2 shadow-lg">
                <span>Send</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                </svg>
            </button>
        </div>
    </footer>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        function handleEnter(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // 1. Show user message in UI
            appendMessage(text, 'user');
            userInput.value = '';
            
            // Disable input while waiting
            userInput.disabled = true;
            sendBtn.disabled = true;
            sendBtn.innerHTML = 'Thinking...';

            try {
                // 2. Send request to your FastAPI backend via Ngrok
                const response = await fetch('https://retention-nectar-cradling.ngrok-free.dev/chat', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'ngrok-skip-browser-warning': 'true' // Bypasses the Ngrok warning screen
                    },
                    body: JSON.stringify({ prompt: text })
                });

                if (!response.ok) throw new Error('Network response was not ok');
                
                const data = await response.json();
                
                // 3. Show AI response in UI
                appendMessage(data.response, 'ai', data.model_used);

            } catch (error) {
                console.error('Error:', error);
                appendMessage("Error: Could not connect to the local Gateway. Is Ngrok and the server running?", 'error');
            } finally {
                // Re-enable input
                userInput.disabled = false;
                sendBtn.disabled = false;
                sendBtn.innerHTML = '<span>Send</span>';
                userInput.focus();
            }
        }

        function appendMessage(text, sender, modelUsed = null) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'}`;

            let innerHTML = '';
            
            if (sender === 'user') {
                innerHTML = `
                    <div class="bg-blue-600 text-white rounded-2xl rounded-tr-none px-6 py-4 max-w-2xl shadow-sm">
                        <p>${text}</p>
                    </div>
                `;
            } else if (sender === 'ai') {
                // Format text to handle basic line breaks
                const formattedText = text.replace(/\n/g, '<br>');
                innerHTML = `
                    <div class="bg-gray-800 rounded-2xl rounded-tl-none px-6 py-4 max-w-2xl shadow-sm border border-gray-700">
                        <p class="text-gray-400 text-xs font-semibold mb-2 tracking-wider uppercase flex items-center gap-2">
                            <span>Answered by:</span> 
                            <span class="text-green-400 bg-gray-900 px-2 py-1 rounded border border-gray-700">${modelUsed}</span>
                        </p>
                        <p class="text-gray-100 leading-relaxed">${formattedText}</p>
                    </div>
                `;
            } else {
                innerHTML = `
                    <div class="bg-red-900/50 border border-red-500 text-red-200 rounded-2xl px-6 py-4 max-w-2xl">
                        <p>${text}</p>
                    </div>
                `;
            }

            wrapper.innerHTML = innerHTML;
            chatBox.appendChild(wrapper);
            
            // Auto-scroll to bottom
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
